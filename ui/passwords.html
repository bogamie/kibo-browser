<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src data:;" />
  <title>Passwords</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Page-local layout for the master/detail password manager (Zen-style). The
       shared style.css supplies the CSS vars + .mini buttons; everything here is
       specific to this page. Two independently-scrolling panes (#pass-list and
       #pass-right) ride our overlay scrollbar. */
    html, body { height: 100%; }
    body.passpage { margin: 0; overflow: hidden; background: var(--bg); color: var(--fg);
      scrollbar-width: none; }
    body.passpage::-webkit-scrollbar { width: 0; height: 0; }
    #passroot { height: 100%; }

    /* gate forms (unlock / set-master / incognito + no-keyring) */
    .passpage .passform { display: flex; flex-direction: column; gap: 10px; }
    .passpage .passinput {
      padding: 9px 11px; border: 1px solid var(--bg3); border-radius: 7px;
      background: var(--bg2); color: inherit; font: inherit; width: 100%; box-sizing: border-box;
    }
    .passpage .passinput:focus { outline: none; border-color: var(--accent); }
    .passpage .passinput.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .passpage .passactions { display: flex; gap: 8px; justify-content: flex-end; }
    .passpage .err { color: var(--red); font-size: 13px; min-height: 16px; }
    .passpage .note { color: var(--muted); font-size: 12px; line-height: 1.5; }
    .passpage .empty { color: var(--muted); padding: 30px; text-align: center; }
    #pass-gate { max-width: 360px; margin: 0 auto; padding: 56px 24px; }

    /* master / detail split — full-width (the convention for two-pane password
       managers: Zen / Firefox about:logins / 1Password). The list is pinned left
       and the detail content is left-aligned with comfortable padding; unlike the
       single-column Settings page, a master/detail layout fills the window. */
    #pass-split { display: flex; height: 100%; }
    #pass-left { width: 320px; flex: none; min-height: 0; display: flex; flex-direction: column;
      border-right: 1px solid var(--bg3); }
    #pass-right { flex: 1; min-width: 0; overflow: auto; padding: 34px 36px 60px; }
    #pass-list { flex: 1; min-height: 0; overflow: auto; padding: 4px 8px 16px; }
    #pass-list, #pass-right { scrollbar-width: none; }
    #pass-list::-webkit-scrollbar, #pass-right::-webkit-scrollbar { width: 0; height: 0; }

    /* left header: search + add on one row, sort + count below */
    #pass-lefthead { padding: 14px 12px 8px; display: flex; flex-direction: column; gap: 10px; }
    #pass-topbar { display: flex; align-items: center; gap: 8px; }
    #pass-search-wrap { flex: 1; display: flex; align-items: center; gap: 6px; background: var(--bg2);
      border: 1px solid transparent; border-radius: 8px; padding: 0 8px; }
    #pass-search-wrap:focus-within { border-color: var(--accent); }
    #pass-search { flex: 1; height: 30px; border: none; background: transparent; color: var(--fg);
      font: inherit; outline: none; }
    #pass-search-ico { color: var(--muted); display: inline-flex; }
    #pass-search-ico svg { width: 15px; height: 15px; }
    #pass-add { flex: none; display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; color: var(--muted); cursor: pointer; padding: 6px;
      border-radius: 8px; }
    #pass-add:hover { color: var(--fg); background: var(--active); }
    #pass-add svg { width: 18px; height: 18px; }
    #pass-sortbar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    #pass-sortby { flex: none; }
    #pass-sort { color-scheme: dark; background: var(--bg2); color: var(--fg);
      border: 1px solid var(--bg3); border-radius: 6px; font: inherit; font-size: 12px;
      cursor: pointer; padding: 3px 6px; }
    #pass-sort:focus { outline: none; border-color: var(--accent); }
    #pass-count { margin-left: auto; color: var(--muted); flex: none; }

    #pass-note { padding: 2px 12px 0; }
    #pass-note:empty { display: none; }
    #pass-master { padding: 10px 12px; border-top: 1px solid var(--bg3); display: flex; gap: 8px;
      flex-wrap: wrap; }
    #pass-master:empty { display: none; }

    /* flat account rows */
    .pass-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px;
      border-radius: 8px; cursor: pointer; }
    .pass-row:hover { background: var(--bg2); }
    .pass-row.selected { background: var(--active); }
    .pass-row .ico { color: var(--muted); display: inline-flex; flex: none; }
    .pass-row .ico img { width: 16px; height: 16px; object-fit: contain; border-radius: 3px; }
    .pass-row .main { flex: 1; min-width: 0; }
    .pass-row .t { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pass-row .u { color: var(--muted); font-size: 11px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; }

    /* detail pane */
    /* detail content sits as a centered column within the full-width right pane
       (list pinned left) — fills the window yet reads like the Settings column. */
    #pass-detail { max-width: 640px; margin: 0 auto; }
    .pass-detail-head { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .pass-detail-head .ico { color: var(--muted); display: inline-flex; flex: none; }
    .pass-detail-head .ico svg { width: 18px; height: 18px; }
    .pass-detail-head .ico img { width: 18px; height: 18px; object-fit: contain; border-radius: 4px; }
    .pass-detail-head .title { font-size: 18px; font-weight: 600; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; }
    .pass-detail-head .head-actions { margin-left: auto; display: flex; gap: 6px; flex: none; }

    .pass-field2 { padding: 12px 0; }
    .pass-field2 .lbl { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .pass-field2 .row { display: flex; align-items: center; gap: 16px; min-height: 26px; }
    .pass-field2 .val { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; }
    .pass-field2 .val.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .03em; }
    .pass-field2 a.val.link { color: var(--accent); cursor: pointer; text-decoration: underline;
      text-underline-offset: 2px; }

    /* always-visible action buttons (Zen-style) */
    .ghostbtn, .copybtn { display: inline-flex; align-items: center; gap: 6px; background: transparent;
      border: none; color: var(--muted); cursor: pointer; font: inherit; font-size: 13px;
      padding: 5px 8px; border-radius: 6px; flex: none; }
    .ghostbtn:hover, .copybtn:hover { color: var(--fg); background: var(--active); }
    .copybtn.ok { color: var(--green); }
    /* delete confirm: both labels overlap in one grid cell so the button width
       stays constant when it toggles to "Delete?" (Edit never shifts). */
    .ghostbtn .lblstack { display: grid; }
    .ghostbtn .lblstack > .l { grid-area: 1 / 1; white-space: nowrap; }
    .ghostbtn .lblstack > .l:nth-child(2) { visibility: hidden; }
    .ghostbtn.confirming .lblstack > .l:nth-child(1) { visibility: hidden; }
    .ghostbtn.confirming .lblstack > .l:nth-child(2) { visibility: visible; }
    .ghostbtn svg, .copybtn svg { width: 15px; height: 15px; }
    .iconbtn { display: inline-flex; align-items: center; justify-content: center; background: transparent;
      border: none; color: var(--muted); cursor: pointer; padding: 5px; border-radius: 6px; flex: none; }
    .iconbtn:hover { color: var(--fg); background: var(--active); }
    .iconbtn svg { width: 16px; height: 16px; }

    /* add / edit form */
    .pass-form { max-width: 460px; display: flex; flex-direction: column; gap: 14px; }
    .pass-form .field { display: flex; flex-direction: column; gap: 5px; }
    .pass-form .field > label { font-size: 12px; color: var(--muted); }
    .pass-pwwrap { display: flex; align-items: center; gap: 4px; }
    .pass-pwwrap .passinput { flex: 1; }

    /* generator */
    .pass-gen { border: 1px solid var(--bg3); border-radius: 8px; padding: 12px;
      display: flex; flex-direction: column; gap: 12px; background: var(--bg2); }
    .pass-gen-top { display: flex; align-items: center; gap: 10px; }
    .pass-gen-top .lbl { flex: 1; color: var(--muted); font-size: 12px; }
    .pass-gen-len { display: flex; align-items: center; gap: 10px; }
    .pass-gen-len .lbl { color: var(--muted); font-size: 12px; }
    .pass-gen-len input[type=range] { flex: 1; accent-color: var(--accent); }
    .pass-gen-len .num { width: 24px; text-align: right; font-variant-numeric: tabular-nums; }
    .pass-gen-classes { display: flex; gap: 14px; flex-wrap: wrap; }
    .pass-chip { display: inline-flex; align-items: center; gap: 5px; cursor: pointer;
      color: var(--muted); font-size: 12px; }
    .pass-chip input { accent-color: var(--accent); margin: 0; }
    .pass-gen-syms { width: 100%; box-sizing: border-box; padding: 6px 8px;
      border: 1px solid var(--bg3); border-radius: 6px; background: var(--bg); color: var(--fg);
      font: inherit; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .pass-gen-syms:focus { outline: none; border-color: var(--accent); }
    .pass-gen-syms:disabled { opacity: .4; }
  </style>
</head>
<body class="passpage">
  <!-- Internal password manager, loaded into a real tab via passwordsPreload.js.
       Talks to main only through window.api (list/reveal/remove/save/update/
       openSite + vault lock). -->
  <main id="passroot">
    <!-- full-width region: unlock form / incognito + set-master / no-keyring -->
    <div id="pass-gate" hidden></div>

    <!-- master (left list) + detail (right) -->
    <div id="pass-split" hidden>
      <section id="pass-left">
        <header id="pass-lefthead">
          <div id="pass-topbar">
            <div id="pass-search-wrap">
              <span id="pass-search-ico" class="ico"></span>
              <input id="pass-search" type="text" data-i18n-ph="pass_searchPh"
                     placeholder="Search saved passwords" autocapitalize="off" spellcheck="false" />
            </div>
            <button id="pass-add" type="button"></button>
          </div>
          <div id="pass-sortbar">
            <span id="pass-sortby"></span>
            <select id="pass-sort"></select>
            <span id="pass-count"></span>
          </div>
        </header>
        <div id="pass-note"></div>
        <div id="pass-list"></div>
        <footer id="pass-master"></footer>
      </section>

      <section id="pass-right">
        <div id="pass-detail"></div>
      </section>
    </div>
  </main>

  <script src="i18n.js"></script>
  <script src="scrollbarCore.js"></script>
  <script src="overlayScrollbar.js"></script>
  <script src="passwords.js"></script>
</body>
</html>
